services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://tattoo_user:tattoo_pass@db:5432/tattoo?sslmode=disable
      GIN_MODE: debug
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tattoo
      POSTGRES_USER: tattoo_user
      POSTGRES_PASSWORD: tattoo_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tattoo_user -d tattoo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
